<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lacefi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #080810; --accent: #c8f545; --muted: #1e1e30; --muted2: #555577; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Syne', sans-serif; color: #f0f0f0; }
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999;
  }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 2.5rem;
    background: linear-gradient(to bottom, rgba(8,8,16,0.95), transparent);
    opacity: 0; transform: translateY(-10px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  nav.visible { opacity: 1; transform: translateY(0); }
  .nav-logo { font-family: 'Syne Mono', monospace; font-size: 1rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { font-family: 'Syne Mono', monospace; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted2); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: var(--accent); }
  .nav-cta { font-family: 'Syne Mono', monospace; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: #080810; background: var(--accent); padding: 0.5rem 1.1rem; border-radius: 2px; text-decoration: none; transition: opacity 0.2s; }
  .nav-cta:hover { opacity: 0.85; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; }
  #stage { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; gap: 0.7rem; }
  #eyebrow { font-family: 'Syne Mono', monospace; font-size: 0.72rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted2); opacity: 0; transform: translateY(6px); transition: opacity 0.8s ease, transform 0.8s ease; }
  #eyebrow.visible { opacity: 1; transform: translateY(0); }
  #tagline { font-size: clamp(1.8rem, 4.5vw, 3.2rem); font-weight: 800; letter-spacing: -0.03em; text-align: center; line-height: 1.15; opacity: 0; transform: translateY(12px); transition: opacity 0.9s ease 0.1s, transform 0.9s ease 0.1s; max-width: 700px; padding: 0 2rem; }
  #tagline.visible { opacity: 1; transform: translateY(0); }
  #tagline span { color: var(--accent); }
  #sub { font-family: 'Syne Mono', monospace; font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted2); opacity: 0; transition: opacity 0.8s ease 0.3s; display: flex; align-items: center; gap: 0.6rem; }
  #sub.visible { opacity: 1; }
  .dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; display: inline-block; }
  footer { position: fixed; bottom: 1.5rem; left: 0; right: 0; text-align: center; font-family: 'Syne Mono', monospace; font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: #33334a; opacity: 0; transition: opacity 1s ease 0.6s; z-index: 200; }
  footer.visible { opacity: 1; }
</style>
</head>
<body>
<nav id="nav">
  <div class="nav-logo">Lacefi</div>
  <ul class="nav-links">
    <li><a href="#">Work</a></li><li><a href="#">Tools</a></li><li><a href="#">About</a></li>
  </ul>
  <a href="mailto:hello@lacefi.co.ke" class="nav-cta">Say Hello</a>
</nav>
<canvas id="c"></canvas>
<div id="stage">
  <div id="eyebrow">— lacefi studio —</div>
  <div id="tagline">Building <span>useful things</span><br>for the web</div>
  <div id="sub"><span class="dot"></span> hello@lacefi.co.ke <span class="dot"></span></div>
</div>
<footer id="footer">© 2025 Lacefi &nbsp;·&nbsp; Nairobi, Kenya</footer>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); computeFinalPositions(); });

const ACCENT = '#c8f545';
const BG = '#080810';

// ── Words ──────────────────────────────────────────
const WORDS = ['Building','useful','things','for','the','web'];
let words = [];
function initWords() {
  words = WORDS.map((w,i) => ({
    w, x: W*0.1+Math.random()*W*0.8, y: H*0.15+Math.random()*H*0.7,
    vx:(Math.random()-0.5)*1.4, vy:(Math.random()-0.5)*1.4,
    size:20+Math.random()*22, opacity:0.1+Math.random()*0.22,
    collected:false, finalX:0, finalY:0, finalSize:0,
    orbitAngle:(i/WORDS.length)*Math.PI*2,
  }));
}
function computeFinalPositions() {
  const fs = Math.min(W/10,52);
  ctx.font = `800 ${fs}px Syne`;
  const lines = [['Building','useful','things'],['for','the','web']];
  const lineH = fs*1.3, startY = H/2-(lines.length*lineH)/2+fs;
  words.forEach(w=>{ w.finalX=0; w.finalY=0; });
  lines.forEach((line,li)=>{
    const lw=ctx.measureText(line.join(' ')).width;
    let cx=W/2-lw/2, cy=startY+li*lineH;
    line.forEach(wrd=>{
      const obj=words.find(o=>o.w===wrd&&o.finalX===0);
      if(obj){ obj.finalX=cx; obj.finalY=cy; obj.finalSize=fs; cx+=ctx.measureText(wrd+' ').width; }
    });
  });
}

// ── Figure ─────────────────────────────────────────
const fig={x:-60,y:0,speed:8,legAngle:0,armAngle:0,facing:1,trail:[]};
let currentTarget=null;
function pickTarget(){
  const av=words.filter(w=>!w.collected); if(!av.length)return null;
  let best=null,bd=Infinity;
  av.forEach(w=>{const d=Math.hypot(w.x-fig.x,w.y-fig.y);if(d<bd){bd=d;best=w;}});
  return best;
}

// ── Food ───────────────────────────────────────────
let food=[];
function spawnFood(){
  food=[];
  for(let i=0;i<22;i++) food.push({x:W*0.05+Math.random()*W*0.9,y:H*0.1+Math.random()*H*0.8,r:2+Math.random()*2.5,eaten:false,opacity:0.4+Math.random()*0.5,pulse:Math.random()*Math.PI*2});
}

// ── Realistic Fish ─────────────────────────────────
// Each fish has its own colour palette for realism
const FISH_DEFS = [
  // Blue/silver tuna-like
  { bodyColor:'#4a8fa8', finColor:'#2d6a85', bellyColor:'#c8dde8', stripeColor:'rgba(30,60,80,0.35)', accentColor:'#88ccdd', size:1.0 },
  // Orange/gold carp-like
  { bodyColor:'#d4722a', finColor:'#a04a10', bellyColor:'#f2c17a', stripeColor:'rgba(160,60,10,0.3)', accentColor:'#f0a050', size:0.82 },
  // Deep green/teal
  { bodyColor:'#2e7d6b', finColor:'#1a5c4e', bellyColor:'#a8d8c8', stripeColor:'rgba(10,60,50,0.35)', accentColor:'#5bbba0', size:0.7 },
];

let fishes=[];
function initFishes(){
  fishes = FISH_DEFS.map((def,i)=>({
    ...def,
    x: -80 - i*120,
    y: H*0.25 + i*(H*0.25),
    angle: 0,
    targetAngle: 0,
    tailWag: Math.random()*Math.PI*2,
    tailFreq: 0.14+Math.random()*0.06,
    speed: 2.2+Math.random()*1.2,
    mouthOpen: 0,
    targetFood: null,
    trail: [],
    active: true,
    wobble: Math.random()*Math.PI*2,
    wobbleAmp: 0.4+Math.random()*0.3,
  }));
}

function drawRealisticFish(f, frame) {
  const { x, y, angle, tailWag, size, bodyColor, finColor, bellyColor, stripeColor, accentColor, mouthOpen } = f;
  const sc = size;
  const BL = 34 * sc; // body length
  const BH = 13 * sc; // body half-height

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // ── Caudal fin (tail) ──────────────────────────
  const tailSwing = Math.sin(tailWag) * 10 * sc;
  const tailSwing2 = Math.sin(tailWag + 0.4) * 7 * sc;

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(-BL*0.65, 0);
  ctx.bezierCurveTo(-BL*0.9, -BH*1.6+tailSwing, -BL*1.35, -BH*1.2+tailSwing, -BL*1.5, tailSwing2);
  ctx.bezierCurveTo(-BL*1.35, BH*1.2+tailSwing, -BL*0.9, BH*1.6+tailSwing, -BL*0.65, 0);
  ctx.closePath();
  const tailGrad = ctx.createLinearGradient(-BL*1.5, 0, -BL*0.65, 0);
  tailGrad.addColorStop(0, finColor+'88');
  tailGrad.addColorStop(1, bodyColor+'cc');
  ctx.fillStyle = tailGrad;
  ctx.fill();

  // Tail rays
  ctx.strokeStyle = finColor+'55'; ctx.lineWidth = 0.8*sc;
  for(let r=0;r<5;r++){
    const t=r/4;
    ctx.beginPath();
    ctx.moveTo(-BL*0.65, 0);
    ctx.lineTo(-BL*1.45, (t-0.5)*BH*2.2+tailSwing);
    ctx.stroke();
  }
  ctx.restore();

  // ── Pectoral fins ──────────────────────────────
  const pSwing = Math.sin(tailWag*1.3)*0.25;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(BL*0.1, BH*0.3);
  ctx.bezierCurveTo(BL*0.05, BH*1.5+pSwing*10, -BL*0.25, BH*2.0+pSwing*8, -BL*0.3, BH*1.2);
  ctx.bezierCurveTo(-BL*0.15, BH*0.5, BL*0.05, BH*0.6, BL*0.1, BH*0.3);
  ctx.closePath();
  ctx.fillStyle = finColor+'99';
  ctx.fill();
  ctx.restore();

  // ── Ventral fin ────────────────────────────────
  ctx.beginPath();
  ctx.moveTo(-BL*0.15, BH*0.8);
  ctx.bezierCurveTo(-BL*0.2, BH*1.8, -BL*0.45, BH*1.9, -BL*0.5, BH*1.1);
  ctx.bezierCurveTo(-BL*0.4, BH*0.85, -BL*0.2, BH*0.9, -BL*0.15, BH*0.8);
  ctx.closePath();
  ctx.fillStyle = finColor+'88'; ctx.fill();

  // ── Body ───────────────────────────────────────
  const bodyGrad = ctx.createRadialGradient(BL*0.1, -BH*0.4, BH*0.1, 0, 0, BL*0.9);
  bodyGrad.addColorStop(0, accentColor);
  bodyGrad.addColorStop(0.4, bodyColor);
  bodyGrad.addColorStop(1, finColor);
  ctx.beginPath();
  ctx.moveTo(BL*0.72, 0);
  ctx.bezierCurveTo(BL*0.55, -BH*1.05, -BL*0.2, -BH*1.15, -BL*0.65, -BH*0.35);
  ctx.bezierCurveTo(-BL*0.85, -BH*0.1, -BL*0.85, BH*0.1, -BL*0.65, BH*0.35);
  ctx.bezierCurveTo(-BL*0.2, BH*1.15, BL*0.55, BH*1.05, BL*0.72, 0);
  ctx.closePath();
  ctx.fillStyle = bodyGrad; ctx.fill();

  // ── Belly lighter area ─────────────────────────
  ctx.beginPath();
  ctx.moveTo(BL*0.55, 0);
  ctx.bezierCurveTo(BL*0.3, BH*0.5, -BL*0.2, BH*0.75, -BL*0.55, BH*0.25);
  ctx.bezierCurveTo(-BL*0.3, BH*0.9, BL*0.3, BH*0.85, BL*0.55, 0);
  ctx.closePath();
  ctx.fillStyle = bellyColor+'55'; ctx.fill();

  // ── Lateral line ───────────────────────────────
  ctx.beginPath();
  ctx.moveTo(BL*0.55, -BH*0.12);
  ctx.bezierCurveTo(BL*0.1, -BH*0.18, -BL*0.25, -BH*0.22, -BL*0.6, -BH*0.05);
  ctx.strokeStyle = stripeColor; ctx.lineWidth = 1.2*sc;
  ctx.stroke();

  // ── Scales (subtle arcs) ───────────────────────
  ctx.strokeStyle = `rgba(0,0,0,0.12)`; ctx.lineWidth = 0.6*sc;
  const scaleRows = 4, scaleCols = 6;
  for(let row=0;row<scaleRows;row++){
    for(let col=0;col<scaleCols;col++){
      const sx = BL*0.45 - col*(BL*0.18);
      const sy = -BH*0.6 + row*(BH*0.4);
      if(Math.abs(sx)>BL*0.7||Math.abs(sy)>BH*1.0) continue;
      ctx.beginPath();
      ctx.arc(sx, sy, BH*0.35, Math.PI*0.9, Math.PI*2.1);
      ctx.stroke();
    }
  }

  // ── Dorsal fin ─────────────────────────────────
  const dorsalSwing = Math.sin(tailWag*0.9)*2*sc;
  ctx.beginPath();
  ctx.moveTo(BL*0.15, -BH*1.0);
  ctx.bezierCurveTo(BL*0.25, -BH*2.3+dorsalSwing, BL*0.0, -BH*2.5+dorsalSwing, -BL*0.1, -BH*2.2+dorsalSwing);
  ctx.bezierCurveTo(-BL*0.2, -BH*1.9+dorsalSwing, -BL*0.35, -BH*1.6, -BL*0.4, -BH*1.0);
  ctx.closePath();
  const dorsGrad = ctx.createLinearGradient(0, -BH*2.5, 0, -BH*1.0);
  dorsGrad.addColorStop(0, finColor+'55');
  dorsGrad.addColorStop(1, bodyColor+'bb');
  ctx.fillStyle = dorsGrad; ctx.fill();

  // Dorsal fin rays
  ctx.strokeStyle = finColor+'44'; ctx.lineWidth = 0.7*sc;
  for(let r=0;r<4;r++){
    const t=r/3;
    ctx.beginPath();
    ctx.moveTo(BL*0.15-t*BL*0.55, -BH*1.0);
    ctx.lineTo(BL*0.2-t*BL*0.35, -BH*2.2+dorsalSwing);
    ctx.stroke();
  }

  // ── Head shading ───────────────────────────────
  const headGrad = ctx.createRadialGradient(BL*0.65, -BH*0.2, 0, BL*0.5, 0, BH*1.1);
  headGrad.addColorStop(0, accentColor+'66');
  headGrad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.ellipse(BL*0.55, 0, BH*1.1, BH*0.9, 0, 0, Math.PI*2);
  ctx.fillStyle = headGrad; ctx.fill();

  // ── Eye ────────────────────────────────────────
  const ex = BL*0.52, ey = -BH*0.22;
  // Eye socket shadow
  ctx.beginPath(); ctx.arc(ex, ey, 4.5*sc, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fill();
  // Iris
  ctx.beginPath(); ctx.arc(ex, ey, 3.8*sc, 0, Math.PI*2);
  const irisGrad = ctx.createRadialGradient(ex-1*sc,ey-1*sc,0.5*sc,ex,ey,3.8*sc);
  irisGrad.addColorStop(0,'#4a3010');
  irisGrad.addColorStop(0.6,'#1a0a00');
  irisGrad.addColorStop(1,'#000');
  ctx.fillStyle = irisGrad; ctx.fill();
  // Pupil
  ctx.beginPath(); ctx.arc(ex, ey, 2*sc, 0, Math.PI*2);
  ctx.fillStyle = '#000'; ctx.fill();
  // Highlight
  ctx.beginPath(); ctx.arc(ex+1.2*sc, ey-1.2*sc, 1.1*sc, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.fill();
  // Iris ring
  ctx.beginPath(); ctx.arc(ex, ey, 3.8*sc, 0, Math.PI*2);
  ctx.strokeStyle='rgba(255,200,100,0.3)'; ctx.lineWidth=0.8*sc; ctx.stroke();

  // ── Mouth ──────────────────────────────────────
  const mx = BL*0.75, my = BH*0.15;
  ctx.beginPath();
  if(mouthOpen > 0.1) {
    ctx.moveTo(mx, my - mouthOpen*3*sc);
    ctx.quadraticCurveTo(mx + 4*sc, my, mx, my + mouthOpen*3*sc);
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fill();
    ctx.strokeStyle = finColor+'99'; ctx.lineWidth=1*sc; ctx.stroke();
  } else {
    ctx.moveTo(mx-2*sc, my-1*sc);
    ctx.quadraticCurveTo(mx+2*sc, my+1*sc, mx-2*sc, my+2*sc);
    ctx.strokeStyle=finColor+'88'; ctx.lineWidth=1*sc; ctx.stroke();
  }

  // ── Body outline ───────────────────────────────
  ctx.beginPath();
  ctx.moveTo(BL*0.72, 0);
  ctx.bezierCurveTo(BL*0.55,-BH*1.05,-BL*0.2,-BH*1.15,-BL*0.65,-BH*0.35);
  ctx.bezierCurveTo(-BL*0.85,-BH*0.1,-BL*0.85,BH*0.1,-BL*0.65,BH*0.35);
  ctx.bezierCurveTo(-BL*0.2,BH*1.15,BL*0.55,BH*1.05,BL*0.72,0);
  ctx.closePath();
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1*sc; ctx.stroke();

  ctx.restore();
}

// ── Sparks ─────────────────────────────────────────
let sparks=[];

// ── Phase ──────────────────────────────────────────
let phase=0, phaseTimer=0, frame=0;
const SCATTER_F=50, ASSEMBLE_F=50;

function tick(){
  requestAnimationFrame(tick);
  frame++; phaseTimer++;

  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='#1e1e30'; ctx.lineWidth=0.3;
  for(let x=0;x<W;x+=55){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=55){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Corners
  ctx.strokeStyle='rgba(200,245,69,0.07)'; ctx.lineWidth=1;
  [[0,0,100,0],[0,0,0,100],[W,0,W-100,0],[W,0,W,100],[0,H,100,H],[0,H,0,H-100],[W,H,W-100,H],[W,H,W,H-100]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});

  // Phase transitions
  if(phase===0&&phaseTimer>=SCATTER_F){phase=1;phaseTimer=0;fig.x=-60;fig.y=H/2+20;computeFinalPositions();currentTarget=pickTarget();}
  if(phase===1&&words.every(w=>w.collected)){phase=2;phaseTimer=0;}
  if(phase===2&&phaseTimer>=ASSEMBLE_F){
    phase=3;phaseTimer=0;
    ['tagline','eyebrow','sub','nav','footer'].forEach(id=>document.getElementById(id).classList.add('visible'));
    spawnFood();
    initFishes();
  }

  // Phase 0 — scatter
  if(phase===0){
    words.forEach(w=>{
      w.x+=w.vx; w.y+=w.vy;
      if(w.x<-100)w.x=W+50; if(w.x>W+100)w.x=-50;
      if(w.y<-50)w.y=H+30; if(w.y>H+50)w.y=-30;
      drawWord(w,w.opacity,w.size);
    });
  }

  // Phase 1 — collect
  if(phase===1){
    words.forEach(w=>{
      if(!w.collected){w.x+=w.vx*0.15;w.y+=w.vy*0.15;w.x=Math.max(30,Math.min(W-30,w.x));w.y=Math.max(50,Math.min(H-50,w.y));drawWord(w,w.opacity,w.size);}
    });
    if(currentTarget){
      const dx=currentTarget.x-fig.x,dy=currentTarget.y-fig.y,dist=Math.hypot(dx,dy);
      fig.facing=dx>0?1:-1;
      if(dist>12){fig.x+=(dx/dist)*fig.speed;fig.y+=(dy/dist)*fig.speed;fig.legAngle=Math.sin(frame*0.38)*0.55;fig.armAngle=Math.sin(frame*0.38+Math.PI)*0.45;}
      else{currentTarget.collected=true;currentTarget=pickTarget();}
    }
    words.filter(w=>w.collected).forEach((w,i,arr)=>{w.orbitAngle+=0.07;const r=30+arr.length*6;w.x=fig.x+Math.cos(w.orbitAngle)*r;w.y=fig.y+Math.sin(w.orbitAngle)*r-10;drawWord(w,0.8,13);});
    fig.trail.push({x:fig.x,y:fig.y});if(fig.trail.length>10)fig.trail.shift();
    fig.trail.forEach((t,i)=>{ctx.beginPath();ctx.arc(t.x,t.y+14,2,0,Math.PI*2);ctx.fillStyle=`rgba(200,245,69,${(i/fig.trail.length)*0.1})`;ctx.fill();});
    drawFigure(fig.x,fig.y,fig.legAngle,fig.armAngle,fig.facing);
  }

  // Phase 2 — assemble
  if(phase===2){
    const p=phaseTimer/ASSEMBLE_F;
    words.forEach((w,i)=>{
      const delay=(i/words.length)*0.4,t=Math.max(0,Math.min(1,(p-delay)/0.7));
      const ease=t<0.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;
      w.x+=(w.finalX-w.x)*(0.15+ease*0.2);w.y+=(w.finalY-w.y)*(0.15+ease*0.2);
      drawWord(w,0.3+ease*0.65,w.size+(w.finalSize-w.size)*ease);
    });
    const fo=Math.max(0,1-p*5);if(fo>0.01)drawFigure(fig.x,fig.y,0,0,fig.facing,fo);
  }

  // Phase 3 — fish & food
  if(phase===3){
    const fade=Math.max(0,1-phaseTimer*0.025);
    words.forEach(w=>{w.x+=(w.finalX-w.x)*0.12;w.y+=(w.finalY-w.y)*0.12;drawWord(w,fade*0.9,w.finalSize);});

    // Food
    food.forEach(f=>{
      if(f.eaten)return;
      f.pulse+=0.06;
      const r=f.r+Math.sin(f.pulse)*0.6;
      // Glow
      const gr=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,r*4);
      gr.addColorStop(0,`rgba(200,245,69,${f.opacity*0.5})`);
      gr.addColorStop(1,'rgba(200,245,69,0)');
      ctx.beginPath();ctx.arc(f.x,f.y,r*4,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
      ctx.beginPath();ctx.arc(f.x,f.y,r,0,Math.PI*2);ctx.fillStyle=`rgba(200,245,69,${f.opacity})`;ctx.fill();
    });

    // Fish
    fishes.forEach((f,fi)=>{
      if(!f.active)return;

      // Find target food
      if(!f.targetFood || f.targetFood.eaten){
        const av=food.filter(fd=>!fd.eaten);
        if(av.length===0){spawnFood();}
        // Each fish picks different food
        const notTaken=food.filter(fd=>!fd.eaten&&!fishes.some((of,oi)=>oi!==fi&&of.targetFood===fd));
        f.targetFood = notTaken.length>0 ? notTaken.reduce((b,fd)=>{const d=Math.hypot(fd.x-f.x,fd.y-f.y);return(!b||d<Math.hypot(b.x-f.x,b.y-f.y))?fd:b;},null) : food.filter(fd=>!fd.eaten)[0]||null;
      }

      if(f.targetFood){
        const dx=f.targetFood.x-f.x, dy=f.targetFood.y-f.y, dist=Math.hypot(dx,dy);
        f.targetAngle=Math.atan2(dy,dx);
        let da=f.targetAngle-f.angle;
        while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2;
        f.angle+=da*0.05;

        // Subtle vertical wobble
        f.wobble+=0.04;
        const wobbleOffset=Math.sin(f.wobble)*f.wobbleAmp;
        const spd=f.speed*(dist<80?0.55:1);
        f.x+=Math.cos(f.angle)*spd;
        f.y+=Math.sin(f.angle)*spd + wobbleOffset;

        f.mouthOpen=dist<55?Math.min(1,(55-dist)/55):Math.max(0,f.mouthOpen-0.06);

        if(dist<20){
          f.targetFood.eaten=true;
          for(let i=0;i<6;i++){
            const a=Math.random()*Math.PI*2,sp=1+Math.random()*2.5;
            sparks.push({x:f.targetFood.x,y:f.targetFood.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,r:2.5});
          }
          f.targetFood=null;
        }
      } else {
        // Wander
        f.wobble+=0.03;
        f.angle+=Math.sin(f.wobble)*0.02;
        f.x+=Math.cos(f.angle)*f.speed*0.7;
        f.y+=Math.sin(f.angle)*f.speed*0.7;
      }

      // Soft boundary bounce
      const margin=80;
      if(f.x<margin){f.targetAngle=0;f.angle+=0.06;}
      if(f.x>W-margin){f.targetAngle=Math.PI;f.angle-=0.06;}
      if(f.y<margin){f.angle+=0.06;}
      if(f.y>H-margin){f.angle-=0.06;}
      f.x=Math.max(10,Math.min(W-10,f.x));
      f.y=Math.max(10,Math.min(H-10,f.y));

      // Tail
      f.tailWag+=f.tailFreq*(f.speed>2?1.4:1);

      // Water trail (bubbles)
      if(frame%6===fi){
        const bx=f.x-Math.cos(f.angle)*20, by=f.y-Math.sin(f.angle)*20;
        sparks.push({x:bx+((Math.random()-0.5)*6),y:by+((Math.random()-0.5)*6),vx:(Math.random()-0.5)*0.3,vy:-0.4-Math.random()*0.5,life:0.6,r:1.5,bubble:true});
      }

      drawRealisticFish(f, frame);
    });

    // Sparks & bubbles
    sparks.forEach(s=>{
      s.x+=s.vx; s.y+=s.vy; s.life-=s.bubble?0.025:0.055; s.r*=s.bubble?0.995:0.93;
      if(s.life>0){
        if(s.bubble){
          ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
          ctx.strokeStyle=`rgba(180,220,255,${s.life*0.5})`;ctx.lineWidth=0.8;ctx.stroke();
        } else {
          ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
          ctx.fillStyle=`rgba(200,245,69,${s.life})`;ctx.fill();
        }
      }
    });
    sparks=sparks.filter(s=>s.life>0);
  }
}

function drawWord(w,op,size){
  if(op<=0)return;
  ctx.save();ctx.font=`800 ${size}px Syne`;ctx.fillStyle=`rgba(200,245,69,${op})`;ctx.fillText(w.w,w.x,w.y);ctx.restore();
}
function drawFigure(x,y,legA,armA,facing,op=1){
  ctx.save();ctx.translate(x,y);ctx.scale(facing,1);ctx.globalAlpha=op;ctx.strokeStyle=ACCENT;ctx.fillStyle=ACCENT;ctx.lineCap='round';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(0,-24,5.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(0,-4);ctx.stroke();
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(-9*Math.cos(armA),-14+9*Math.sin(armA));ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(9*Math.cos(armA),-14-9*Math.sin(armA));ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-4);ctx.lineTo(-7*Math.cos(legA+0.3),6+7*Math.sin(legA));ctx.lineTo(-5*Math.cos(legA),14+4*Math.sin(legA));ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-4);ctx.lineTo(7*Math.cos(legA+0.3),6-7*Math.sin(legA));ctx.lineTo(5*Math.cos(legA),14-4*Math.sin(legA));ctx.stroke();
  ctx.restore();
}

initWords();
tick();
</script>
