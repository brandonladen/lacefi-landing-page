<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lacefi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #080810; --accent: #c8f545; --muted: #1e1e30; --muted2: #555577; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Syne', sans-serif; color: #f0f0f0; }

  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.5rem;
    background: linear-gradient(to bottom, rgba(8,8,16,0.97), transparent);
    opacity: 0; transform: translateY(-10px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  nav.visible { opacity: 1; transform: translateY(0); }

  .nav-logo { font-family: 'Syne Mono', monospace; font-size: 0.95rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); }

  .nav-links { display: flex; gap: 1.5rem; list-style: none; }
  .nav-links a { font-family: 'Syne Mono', monospace; font-size: 0.68rem; letter-spacing: 0.13em; text-transform: uppercase; color: var(--muted2); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: var(--accent); }

  .nav-cta { font-family: 'Syne Mono', monospace; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: #080810; background: var(--accent); padding: 0.45rem 0.9rem; border-radius: 2px; text-decoration: none; white-space: nowrap; }

  /* Mobile nav — hide links, keep logo + cta */
  @media (max-width: 600px) {
    .nav-links { display: none; }
    nav { padding: 0.9rem 1.2rem; }
  }

  canvas { position: fixed; inset: 0; width: 100%; height: 100%; }

  /* ── STAGE ── */
  #stage {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none; gap: 0.6rem;
    padding: 5rem 1.5rem 4rem;
  }

  #eyebrow {
    font-family: 'Syne Mono', monospace;
    font-size: clamp(0.6rem, 2vw, 0.72rem);
    letter-spacing: 0.28em; text-transform: uppercase; color: var(--muted2);
    opacity: 0; transform: translateY(6px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    text-align: center;
  }
  #eyebrow.visible { opacity: 1; transform: translateY(0); }

  #tagline {
    font-size: clamp(1.5rem, 7vw, 3.2rem);
    font-weight: 800; letter-spacing: -0.03em;
    text-align: center; line-height: 1.15;
    opacity: 0; transform: translateY(12px);
    transition: opacity 0.9s ease 0.1s, transform 0.9s ease 0.1s;
    max-width: 680px; padding: 0 1rem;
  }
  #tagline.visible { opacity: 1; transform: translateY(0); }
  #tagline span { color: var(--accent); }

  #sub {
    font-family: 'Syne Mono', monospace;
    font-size: clamp(0.58rem, 2vw, 0.72rem);
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted2);
    opacity: 0; transition: opacity 0.8s ease 0.3s;
    display: flex; align-items: center; gap: 0.5rem;
    flex-wrap: wrap; justify-content: center; text-align: center;
  }
  #sub.visible { opacity: 1; }
  .dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; display: inline-block; flex-shrink: 0; }

  footer {
    position: fixed; bottom: 1rem; left: 0; right: 0;
    text-align: center;
    font-family: 'Syne Mono', monospace;
    font-size: clamp(0.55rem, 1.8vw, 0.62rem);
    letter-spacing: 0.18em; text-transform: uppercase; color: #33334a;
    opacity: 0; transition: opacity 1s ease 0.6s; z-index: 200;
    padding: 0 1rem;
  }
  footer.visible { opacity: 1; }
</style>
</head>
<body>
<nav id="nav">
  <div class="nav-logo">Lacefi</div>
  <ul class="nav-links">
    <li><a href="#">Work</a></li>
    <li><a href="#">Tools</a></li>
    <li><a href="#">About</a></li>
  </ul>
  <a href="mailto:hello@lacefi.co.ke" class="nav-cta">Say Hello</a>
</nav>

<canvas id="c"></canvas>

<div id="stage">
  <div id="eyebrow">— lacefi studio —</div>
  <div id="tagline">Building <span>useful things</span><br>for the web</div>
  <div id="sub"><span class="dot"></span> hello@lacefi.co.ke <span class="dot"></span></div>
</div>
<footer id="footer">© 2026 Lacefi &nbsp;·&nbsp; Nairobi, Kenya</footer>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); computeFinalPositions(); });

const ACCENT = '#c8f545';
const BG = '#080810';

// ── Detect mobile ─────────────────────────────────
const isMobile = () => window.innerWidth < 600;

// ── Words ─────────────────────────────────────────
const WORDS = ['Building','useful','things','for','the','web'];
let words = [];
function initWords() {
  words = WORDS.map((w,i) => ({
    w, x: W*0.1+Math.random()*W*0.8, y: H*0.15+Math.random()*H*0.7,
    vx:(Math.random()-0.5)*1.4, vy:(Math.random()-0.5)*1.4,
    size:18+Math.random()*18, opacity:0.1+Math.random()*0.22,
    collected:false, finalX:0, finalY:0, finalSize:0,
    orbitAngle:(i/WORDS.length)*Math.PI*2,
  }));
}

function computeFinalPositions() {
  const fs = Math.min(W / (isMobile() ? 6.5 : 10), 52);
  ctx.font = `800 ${fs}px Syne`;
  const lines = [['Building','useful','things'],['for','the','web']];
  const lineH = fs * 1.3;
  const startY = H/2 - (lines.length*lineH)/2 + fs;
  words.forEach(w => { w.finalX=0; w.finalY=0; });
  lines.forEach((line, li) => {
    const lw = ctx.measureText(line.join(' ')).width;
    let cx = W/2 - lw/2, cy = startY + li*lineH;
    // On very small screens, clamp to screen
    cx = Math.max(8, cx);
    line.forEach(wrd => {
      const obj = words.find(o => o.w===wrd && o.finalX===0);
      if(obj){ obj.finalX=cx; obj.finalY=cy; obj.finalSize=fs; cx+=ctx.measureText(wrd+' ').width; }
    });
  });
}

// ── Figure ─────────────────────────────────────────
const fig = { x:-60, y:0, speed:8, legAngle:0, armAngle:0, facing:1, trail:[] };
let currentTarget = null;
function pickTarget(){
  const av=words.filter(w=>!w.collected); if(!av.length) return null;
  let best=null, bd=Infinity;
  av.forEach(w=>{ const d=Math.hypot(w.x-fig.x,w.y-fig.y); if(d<bd){bd=d;best=w;} });
  return best;
}

// ── Food ───────────────────────────────────────────
let food = [];
function spawnFood(){
  food = [];
  const count = isMobile() ? 12 : 22;
  for(let i=0;i<count;i++) food.push({
    x:W*0.06+Math.random()*W*0.88, y:H*0.12+Math.random()*H*0.76,
    r:2+Math.random()*2.2, eaten:false,
    opacity:0.4+Math.random()*0.5, pulse:Math.random()*Math.PI*2
  });
}

// ── Fish defs ──────────────────────────────────────
const FISH_DEFS = [
  { bodyColor:'#4a8fa8', finColor:'#2d6a85', bellyColor:'#c8dde8', stripeColor:'rgba(30,60,80,0.35)', accentColor:'#88ccdd', size:1.0 },
  { bodyColor:'#d4722a', finColor:'#a04a10', bellyColor:'#f2c17a', stripeColor:'rgba(160,60,10,0.3)',  accentColor:'#f0a050', size:0.82 },
  { bodyColor:'#2e7d6b', finColor:'#1a5c4e', bellyColor:'#a8d8c8', stripeColor:'rgba(10,60,50,0.35)', accentColor:'#5bbba0', size:0.7 },
];
let fishes = [];
function initFishes(){
  // On mobile use smaller fish
  const mob = isMobile();
  fishes = FISH_DEFS.map((def,i) => ({
    ...def,
    size: def.size * (mob ? 0.65 : 1),
    x: -80 - i*100, y: H*0.25 + i*(H*0.25),
    angle:0, targetAngle:0,
    tailWag:Math.random()*Math.PI*2,
    tailFreq:0.14+Math.random()*0.06,
    speed: mob ? 1.8+Math.random()*0.8 : 2.2+Math.random()*1.2,
    mouthOpen:0, targetFood:null, trail:[],
    active:true, wobble:Math.random()*Math.PI*2,
    wobbleAmp:0.3+Math.random()*0.3,
  }));
}

function drawRealisticFish(f) {
  const { x, y, angle, tailWag, size:sc, bodyColor, finColor, bellyColor, stripeColor, accentColor, mouthOpen } = f;
  const BL = 34*sc, BH = 13*sc;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Tail
  const ts = Math.sin(tailWag)*10*sc, ts2 = Math.sin(tailWag+0.4)*7*sc;
  ctx.beginPath();
  ctx.moveTo(-BL*0.65,0);
  ctx.bezierCurveTo(-BL*0.9,-BH*1.6+ts,-BL*1.35,-BH*1.2+ts,-BL*1.5,ts2);
  ctx.bezierCurveTo(-BL*1.35,BH*1.2+ts,-BL*0.9,BH*1.6+ts,-BL*0.65,0);
  ctx.closePath();
  const tg=ctx.createLinearGradient(-BL*1.5,0,-BL*0.65,0);
  tg.addColorStop(0,finColor+'88'); tg.addColorStop(1,bodyColor+'cc');
  ctx.fillStyle=tg; ctx.fill();

  // Tail rays
  ctx.strokeStyle=finColor+'55'; ctx.lineWidth=0.8*sc;
  for(let r=0;r<5;r++){ const t=r/4; ctx.beginPath(); ctx.moveTo(-BL*0.65,0); ctx.lineTo(-BL*1.45,(t-0.5)*BH*2.2+ts); ctx.stroke(); }

  // Pectoral fin
  const ps=Math.sin(tailWag*1.3)*0.25;
  ctx.beginPath();
  ctx.moveTo(BL*0.1,BH*0.3);
  ctx.bezierCurveTo(BL*0.05,BH*1.5+ps*10,-BL*0.25,BH*2.0+ps*8,-BL*0.3,BH*1.2);
  ctx.bezierCurveTo(-BL*0.15,BH*0.5,BL*0.05,BH*0.6,BL*0.1,BH*0.3);
  ctx.closePath(); ctx.fillStyle=finColor+'99'; ctx.fill();

  // Ventral fin
  ctx.beginPath();
  ctx.moveTo(-BL*0.15,BH*0.8);
  ctx.bezierCurveTo(-BL*0.2,BH*1.8,-BL*0.45,BH*1.9,-BL*0.5,BH*1.1);
  ctx.bezierCurveTo(-BL*0.4,BH*0.85,-BL*0.2,BH*0.9,-BL*0.15,BH*0.8);
  ctx.closePath(); ctx.fillStyle=finColor+'88'; ctx.fill();

  // Body
  const bg=ctx.createRadialGradient(BL*0.1,-BH*0.4,BH*0.1,0,0,BL*0.9);
  bg.addColorStop(0,accentColor); bg.addColorStop(0.4,bodyColor); bg.addColorStop(1,finColor);
  ctx.beginPath();
  ctx.moveTo(BL*0.72,0);
  ctx.bezierCurveTo(BL*0.55,-BH*1.05,-BL*0.2,-BH*1.15,-BL*0.65,-BH*0.35);
  ctx.bezierCurveTo(-BL*0.85,-BH*0.1,-BL*0.85,BH*0.1,-BL*0.65,BH*0.35);
  ctx.bezierCurveTo(-BL*0.2,BH*1.15,BL*0.55,BH*1.05,BL*0.72,0);
  ctx.closePath(); ctx.fillStyle=bg; ctx.fill();

  // Belly
  ctx.beginPath();
  ctx.moveTo(BL*0.55,0);
  ctx.bezierCurveTo(BL*0.3,BH*0.5,-BL*0.2,BH*0.75,-BL*0.55,BH*0.25);
  ctx.bezierCurveTo(-BL*0.3,BH*0.9,BL*0.3,BH*0.85,BL*0.55,0);
  ctx.closePath(); ctx.fillStyle=bellyColor+'55'; ctx.fill();

  // Lateral line
  ctx.beginPath(); ctx.moveTo(BL*0.55,-BH*0.12);
  ctx.bezierCurveTo(BL*0.1,-BH*0.18,-BL*0.25,-BH*0.22,-BL*0.6,-BH*0.05);
  ctx.strokeStyle=stripeColor; ctx.lineWidth=1.2*sc; ctx.stroke();

  // Scales
  ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=0.6*sc;
  for(let row=0;row<4;row++) for(let col=0;col<6;col++){
    const sx=BL*0.45-col*(BL*0.18), sy=-BH*0.6+row*(BH*0.4);
    if(Math.abs(sx)>BL*0.7||Math.abs(sy)>BH*1.0) continue;
    ctx.beginPath(); ctx.arc(sx,sy,BH*0.35,Math.PI*0.9,Math.PI*2.1); ctx.stroke();
  }

  // Dorsal fin
  const ds=Math.sin(tailWag*0.9)*2*sc;
  ctx.beginPath();
  ctx.moveTo(BL*0.15,-BH*1.0);
  ctx.bezierCurveTo(BL*0.25,-BH*2.3+ds,BL*0.0,-BH*2.5+ds,-BL*0.1,-BH*2.2+ds);
  ctx.bezierCurveTo(-BL*0.2,-BH*1.9+ds,-BL*0.35,-BH*1.6,-BL*0.4,-BH*1.0);
  ctx.closePath();
  const dg=ctx.createLinearGradient(0,-BH*2.5,0,-BH*1.0);
  dg.addColorStop(0,finColor+'55'); dg.addColorStop(1,bodyColor+'bb');
  ctx.fillStyle=dg; ctx.fill();
  ctx.strokeStyle=finColor+'44'; ctx.lineWidth=0.7*sc;
  for(let r=0;r<4;r++){ const t=r/3; ctx.beginPath(); ctx.moveTo(BL*0.15-t*BL*0.55,-BH*1.0); ctx.lineTo(BL*0.2-t*BL*0.35,-BH*2.2+ds); ctx.stroke(); }

  // Head glow
  const hg=ctx.createRadialGradient(BL*0.65,-BH*0.2,0,BL*0.5,0,BH*1.1);
  hg.addColorStop(0,accentColor+'66'); hg.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.ellipse(BL*0.55,0,BH*1.1,BH*0.9,0,0,Math.PI*2); ctx.fillStyle=hg; ctx.fill();

  // Eye
  const ex=BL*0.52, ey=-BH*0.22;
  ctx.beginPath(); ctx.arc(ex,ey,4.5*sc,0,Math.PI*2); ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fill();
  ctx.beginPath(); ctx.arc(ex,ey,3.8*sc,0,Math.PI*2);
  const ig=ctx.createRadialGradient(ex-sc,ey-sc,0.5*sc,ex,ey,3.8*sc);
  ig.addColorStop(0,'#4a3010'); ig.addColorStop(0.6,'#1a0a00'); ig.addColorStop(1,'#000');
  ctx.fillStyle=ig; ctx.fill();
  ctx.beginPath(); ctx.arc(ex,ey,2*sc,0,Math.PI*2); ctx.fillStyle='#000'; ctx.fill();
  ctx.beginPath(); ctx.arc(ex+1.2*sc,ey-1.2*sc,1.1*sc,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fill();
  ctx.beginPath(); ctx.arc(ex,ey,3.8*sc,0,Math.PI*2); ctx.strokeStyle='rgba(255,200,100,0.3)'; ctx.lineWidth=0.8*sc; ctx.stroke();

  // Mouth
  const mx=BL*0.75, my=BH*0.15;
  ctx.beginPath();
  if(mouthOpen>0.1){ ctx.moveTo(mx,my-mouthOpen*3*sc); ctx.quadraticCurveTo(mx+4*sc,my,mx,my+mouthOpen*3*sc); ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fill(); ctx.strokeStyle=finColor+'99'; ctx.lineWidth=sc; ctx.stroke(); }
  else { ctx.moveTo(mx-2*sc,my-sc); ctx.quadraticCurveTo(mx+2*sc,my+sc,mx-2*sc,my+2*sc); ctx.strokeStyle=finColor+'88'; ctx.lineWidth=sc; ctx.stroke(); }

  // Outline
  ctx.beginPath();
  ctx.moveTo(BL*0.72,0);
  ctx.bezierCurveTo(BL*0.55,-BH*1.05,-BL*0.2,-BH*1.15,-BL*0.65,-BH*0.35);
  ctx.bezierCurveTo(-BL*0.85,-BH*0.1,-BL*0.85,BH*0.1,-BL*0.65,BH*0.35);
  ctx.bezierCurveTo(-BL*0.2,BH*1.15,BL*0.55,BH*1.05,BL*0.72,0);
  ctx.closePath(); ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=sc; ctx.stroke();

  ctx.restore();
}

let sparks = [];
let phase=0, phaseTimer=0, frame=0;
const SCATTER_F=50, ASSEMBLE_F=50;

function tick(){
  requestAnimationFrame(tick);
  frame++; phaseTimer++;

  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

  // Grid (skip on small mobile for perf)
  if(!isMobile()||frame%2===0){
    ctx.strokeStyle='#1e1e30'; ctx.lineWidth=0.3;
    const gs=55;
    for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  }

  // Corners
  ctx.strokeStyle='rgba(200,245,69,0.07)'; ctx.lineWidth=1;
  const cl=isMobile()?60:100;
  [[0,0,cl,0],[0,0,0,cl],[W,0,W-cl,0],[W,0,W,cl],[0,H,cl,H],[0,H,0,H-cl],[W,H,W-cl,H],[W,H,W,H-cl]]
    .forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});

  // Transitions
  if(phase===0&&phaseTimer>=SCATTER_F){phase=1;phaseTimer=0;fig.x=-60;fig.y=H/2+20;computeFinalPositions();currentTarget=pickTarget();}
  if(phase===1&&words.every(w=>w.collected)){phase=2;phaseTimer=0;}
  if(phase===2&&phaseTimer>=ASSEMBLE_F){
    phase=3;phaseTimer=0;
    ['tagline','eyebrow','sub','nav','footer'].forEach(id=>document.getElementById(id).classList.add('visible'));
    spawnFood(); initFishes();
  }

  // Phase 0
  if(phase===0){
    words.forEach(w=>{
      w.x+=w.vx; w.y+=w.vy;
      if(w.x<-100)w.x=W+50; if(w.x>W+100)w.x=-50;
      if(w.y<-50)w.y=H+30; if(w.y>H+50)w.y=-30;
      drawWord(w,w.opacity,w.size);
    });
  }

  // Phase 1
  if(phase===1){
    words.forEach(w=>{
      if(!w.collected){w.x+=w.vx*0.15;w.y+=w.vy*0.15;w.x=Math.max(30,Math.min(W-30,w.x));w.y=Math.max(50,Math.min(H-50,w.y));drawWord(w,w.opacity,w.size);}
    });
    if(currentTarget){
      const dx=currentTarget.x-fig.x,dy=currentTarget.y-fig.y,dist=Math.hypot(dx,dy);
      fig.facing=dx>0?1:-1;
      if(dist>12){fig.x+=(dx/dist)*fig.speed;fig.y+=(dy/dist)*fig.speed;fig.legAngle=Math.sin(frame*0.38)*0.55;fig.armAngle=Math.sin(frame*0.38+Math.PI)*0.45;}
      else{currentTarget.collected=true;currentTarget=pickTarget();}
    }
    words.filter(w=>w.collected).forEach((w,i,arr)=>{
      w.orbitAngle+=0.07; const r=25+arr.length*5;
      w.x=fig.x+Math.cos(w.orbitAngle)*r; w.y=fig.y+Math.sin(w.orbitAngle)*r-8;
      drawWord(w,0.8,12);
    });
    fig.trail.push({x:fig.x,y:fig.y}); if(fig.trail.length>10)fig.trail.shift();
    fig.trail.forEach((t,i)=>{ ctx.beginPath();ctx.arc(t.x,t.y+14,2,0,Math.PI*2);ctx.fillStyle=`rgba(200,245,69,${(i/fig.trail.length)*0.1})`;ctx.fill(); });
    drawFigure(fig.x,fig.y,fig.legAngle,fig.armAngle,fig.facing);
  }

  // Phase 2
  if(phase===2){
    const p=phaseTimer/ASSEMBLE_F;
    words.forEach((w,i)=>{
      const delay=(i/words.length)*0.4,t=Math.max(0,Math.min(1,(p-delay)/0.7));
      const ease=t<0.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;
      w.x+=(w.finalX-w.x)*(0.15+ease*0.2); w.y+=(w.finalY-w.y)*(0.15+ease*0.2);
      drawWord(w,0.3+ease*0.65,w.size+(w.finalSize-w.size)*ease);
    });
    const fo=Math.max(0,1-p*5); if(fo>0.01) drawFigure(fig.x,fig.y,0,0,fig.facing,fo);
  }

  // Phase 3
  if(phase===3){
    const fade=Math.max(0,1-phaseTimer*0.025);
    words.forEach(w=>{ w.x+=(w.finalX-w.x)*0.12; w.y+=(w.finalY-w.y)*0.12; drawWord(w,fade*0.9,w.finalSize); });

    // Food
    food.forEach(f=>{
      if(f.eaten)return;
      f.pulse+=0.06;
      const r=f.r+Math.sin(f.pulse)*0.6;
      const gr=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,r*4);
      gr.addColorStop(0,`rgba(200,245,69,${f.opacity*0.5})`); gr.addColorStop(1,'rgba(200,245,69,0)');
      ctx.beginPath();ctx.arc(f.x,f.y,r*4,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
      ctx.beginPath();ctx.arc(f.x,f.y,r,0,Math.PI*2);ctx.fillStyle=`rgba(200,245,69,${f.opacity})`;ctx.fill();
    });

    // Fish
    fishes.forEach((f,fi)=>{
      if(!f.active)return;
      if(!f.targetFood||f.targetFood.eaten){
        const av=food.filter(fd=>!fd.eaten);
        if(!av.length) spawnFood();
        const notTaken=food.filter(fd=>!fd.eaten&&!fishes.some((of,oi)=>oi!==fi&&of.targetFood===fd));
        f.targetFood=(notTaken.length>0?notTaken:food.filter(fd=>!fd.eaten)).reduce((b,fd)=>{const d=Math.hypot(fd.x-f.x,fd.y-f.y);return(!b||d<Math.hypot(b.x-f.x,b.y-f.y))?fd:b;},null);
      }
      if(f.targetFood){
        const dx=f.targetFood.x-f.x,dy=f.targetFood.y-f.y,dist=Math.hypot(dx,dy);
        f.targetAngle=Math.atan2(dy,dx);
        let da=f.targetAngle-f.angle;
        while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2;
        // Faster turning when close
        f.angle+=da*(dist<60?0.12:0.05);
        f.wobble+=0.04;
        // Suppress wobble when close so fish doesn't miss food
        const wobbleFactor = dist<80 ? Math.max(0,(dist-20)/60) : 1;
        const spd = f.speed*(dist<80?0.65:1);
        f.x+=Math.cos(f.angle)*spd;
        f.y+=Math.sin(f.angle)*spd + Math.sin(f.wobble)*f.wobbleAmp*wobbleFactor;
        f.mouthOpen=dist<60?Math.min(1,(60-dist)/60):Math.max(0,f.mouthOpen-0.06);
        // Larger eat radius, scaled with fish size
        const eatR = 26 * f.size;
        if(dist<eatR){
          f.targetFood.eaten=true;
          for(let i=0;i<5;i++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*2;sparks.push({x:f.targetFood.x,y:f.targetFood.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,r:2.5,bubble:false});}
          f.targetFood=null;
        }
      } else {
        f.wobble+=0.03; f.angle+=Math.sin(f.wobble)*0.02;
        f.x+=Math.cos(f.angle)*f.speed*0.7; f.y+=Math.sin(f.angle)*f.speed*0.7;
      }
      // Stronger boundary — actively steer fish back
      const mg=55;
      if(f.x<mg){ f.angle=f.angle*0.85+0*0.15; f.angle+=0.1; }
      if(f.x>W-mg){ f.angle=f.angle*0.85+Math.PI*0.15; f.angle-=0.1; }
      if(f.y<mg) f.angle+=0.1;
      if(f.y>H-mg) f.angle-=0.1;
      f.x=Math.max(12,Math.min(W-12,f.x)); f.y=Math.max(12,Math.min(H-12,f.y));
      f.tailWag+=f.tailFreq;

      // Bubbles (less on mobile)
      if(frame%(isMobile()?12:6)===fi){ const bx=f.x-Math.cos(f.angle)*20,by=f.y-Math.sin(f.angle)*20; sparks.push({x:bx+(Math.random()-0.5)*6,y:by+(Math.random()-0.5)*6,vx:(Math.random()-0.5)*0.3,vy:-0.4-Math.random()*0.5,life:0.6,r:1.5,bubble:true}); }

      drawRealisticFish(f);
    });

    // Sparks/bubbles
    sparks.forEach(s=>{ s.x+=s.vx;s.y+=s.vy;s.life-=s.bubble?0.025:0.055;s.r*=s.bubble?0.995:0.93;
      if(s.life>0){
        if(s.bubble){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.strokeStyle=`rgba(180,220,255,${s.life*0.5})`;ctx.lineWidth=0.8;ctx.stroke();}
        else{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,245,69,${s.life})`;ctx.fill();}
      }
    });
    sparks=sparks.filter(s=>s.life>0);
  }
}

function drawWord(w,op,size){
  if(op<=0)return;
  ctx.save();ctx.font=`800 ${size}px Syne`;ctx.fillStyle=`rgba(200,245,69,${op})`;ctx.fillText(w.w,w.x,w.y);ctx.restore();
}
function drawFigure(x,y,legA,armA,facing,op=1){
  ctx.save();ctx.translate(x,y);ctx.scale(facing,1);ctx.globalAlpha=op;
  ctx.strokeStyle=ACCENT;ctx.fillStyle=ACCENT;ctx.lineCap='round';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(0,-24,5.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(0,-4);ctx.stroke();
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(-9*Math.cos(armA),-14+9*Math.sin(armA));ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(9*Math.cos(armA),-14-9*Math.sin(armA));ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-4);ctx.lineTo(-7*Math.cos(legA+0.3),6+7*Math.sin(legA));ctx.lineTo(-5*Math.cos(legA),14+4*Math.sin(legA));ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-4);ctx.lineTo(7*Math.cos(legA+0.3),6-7*Math.sin(legA));ctx.lineTo(5*Math.cos(legA),14-4*Math.sin(legA));ctx.stroke();
  ctx.restore();
}

initWords();
tick();
</script>
